<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
  </head>
  <body>
    <div class="navbar">
      <div class="nav-top"><i class="fa-solid fa-cube"></i>DashBox</div>

      <div class="nav-content">
        <button class="nav-btn">
          <i class="fa-solid fa-chart-line"></i>Dashboard
        </button>
        <button class="nav-btn">
          <i class="fa-solid fa-terminal"></i>Panel
        </button>
        <button class="nav-btn">
          <i class="fa-solid fa-layer-group"></i>Database
        </button>
        <button class="nav-btn">
          <i class="fa-solid fa-envelope"></i>Inbox
        </button>
        <button class="nav-btn"><i class="fa-solid fa-gear"></i>Setting</button>
      </div>

      <div class="nav-bottom"></div>
    </div>

    <div class="mainwarper">
      <div class="topbar">Top Bar</div>

      <div class="content">Content</div>
    </div>
  </body>
</html>
